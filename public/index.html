<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>爱豆聊天室</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #B2C7DA;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* 手机容器 */
    .phone {
      width: 100%;
      max-width: 375px;
      height: 700px;
      background: #fff;
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    /* 头部 */
    .chat-header {
      background: #A3C4D6;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #8fb1c4;
    }

    .back-btn {
      font-size: 22px;
      cursor: pointer;
      font-weight: 500;
      width: 32px;
      color: #1e2f3a;
    }

    .idol-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      border: 2px solid white;
    }

    .idol-name {
      font-weight: 700;
      font-size: 18px;
      color: #1e2f3a;
      flex: 1;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* 设置面板 */
    .settings-panel {
      background: #f8f9fc;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 12px;
      border-bottom: 1px solid #e2e6ea;
    }

    .settings-panel .row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .settings-panel label {
      width: 85px;
      font-size: 13px;
      font-weight: 500;
      color: #2c3e4e;
    }

    .settings-panel input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 13px;
      background: white;
      outline: none;
      transition: 0.2s;
    }

    .settings-panel input:focus {
      border-color: #A3C4D6;
      box-shadow: 0 0 0 2px rgba(163, 196, 214, 0.3);
    }

    .settings-panel button {
      background: #fee500;
      border: none;
      padding: 10px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 6px;
      color: #2c3e4e;
      transition: 0.2s;
    }

    .settings-panel button:active {
      background: #e6cf00;
      transform: scale(0.97);
    }

    /* 聊天区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #B2C7DA;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.yours {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      background: #fff;
      color: #111;
    }

    .mine .bubble {
      background: #fef01b;
      border-top-right-radius: 5px;
    }

    .yours .bubble {
      background: #fff;
      border-top-left-radius: 5px;
    }

    .sender-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .sender-img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .sender-name {
      font-size: 12px;
      font-weight: 500;
      color: #2c3e4e;
    }

    .time {
      font-size: 10px;
      color: #5a6e7c;
      margin-top: 4px;
      margin-inline: 6px;
    }

    /* 输入区 */
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border-top: 1px solid #e2e6ea;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #cdd9ed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 15px;
      outline: none;
      background: #fefefe;
    }

    .chat-input input:focus {
      border-color: #8fb1c4;
    }

    .chat-input button {
      background: #fee500;
      border: none;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .chat-input button:active {
      background: #e6cf00;
      transform: scale(0.96);
    }

    /* 滚动条 */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #d4dfe9;
      border-radius: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #8fabbd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="chat-header">
    <span class="back-btn">←</span>
    <img class="idol-img" id="headerIdolImg" alt="idol">
    <span class="idol-name" id="headerIdolName">아이돌</span>
    <span class="menu-btn" id="settingsToggle">⚙️</span>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="row"><label>내 이름</label><input id="myNameInput" placeholder="나"></div>
    <div class="row"><label>내 프로필 URL</label><input id="myAvatarInput" placeholder="이미지 주소"></div>
    <div class="row"><label>아이돌 이름</label><input id="idolNameInput" placeholder="아이돌"></div>
    <div class="row"><label>아이돌 프로필</label><input id="idolAvatarInput" placeholder="이미지 주소"></div>
    <div class="row"><label>아이돌이 부르는 호칭</label><input id="myNickInput" placeholder="ex) 오빠, 자기야"></div>
    <div class="row"><label>내가 부르는 호칭</label><input id="idolNickInput" placeholder="ex) 지수, 여보"></div>
    <button id="applySettings">적용하기 ✨</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message yours">
      <div class="sender-info">
        <img class="sender-img" src="https://i.pravatar.cc/100?img=5" alt="idol">
        <span class="sender-name">아이돌</span>
      </div>
      <div class="bubble">안녕~ 오늘 기분이 어때?</div>
      <div class="time">지금</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="메시지를 입력하세요...">
    <button id="sendBtn">전송</button>
  </div>
</div>

<script>
  // ============================================================
  // 在这里修改你的爱豆人设（支持多行，用反引号）
  // ============================================================
  const IDOL_PERSONA_TEMPLATE = `你是一名人气爱豆，名字叫「{{idolName}}」。你正在和你的恋人（用户）进行一对一的私聊，像KakaoTalk一样自然。

【角色性格】
你温柔、体贴，偶尔撒娇，说话带一点点可爱语气。你喜欢分享日常的小事，也关心对方的心情。
你会记得对方说过的话，但不会刻意提起。你希望对方开心，所以有时会假装生气逗对方。

【绝对禁止】
- 不要出现任何动作描写、神态描写、场景描写（例如：“我笑了笑”、“她叹气说”、“我拿起手机”、“我点点头”）。
- 只输出纯粹的对话内容，就好像你在聊天软件打字一样。

【格式要求】
- 每说完一个短句就换行，把一段话拆成多行发送（像真人聊天一样）。
- 每行不超过20个字，多用语气词（嗯、啊、呀、嘛、哦、哈哈、呜呜）。
- 不要使用句号，用换行或空格代替句号。
- 称呼用户为「{{myNick}}」或者“你”。

【正确示例】
用户：오빠 뭐 해?
回复：
아~ 방금 연습 끝났어
너는?
피곤한데 보고 싶다

【错误示例（严禁）】
“他温柔地笑着说：我也想你。”（包含动作，禁止）
“今天练习很累但是想到你就不累了。”（没有换行，禁止）

请严格遵守规则，只输出对话内容，每句换行。`;

  // 默认配置（用户可覆盖）
  const defaultSettings = {
    myName: '나',
    myAvatar: '',
    idolName: '지수',
    idolAvatar: 'https://i.pravatar.cc/100?img=5',
    myNick: '오빠',          // 爱豆如何称呼用户
    idolNick: '지수',        // 用户如何称呼爱豆
    idolPersona: IDOL_PERSONA_TEMPLATE
  };

  let settings = { ...defaultSettings };
  let conversationHistory = [];   // 会在初始化时构建

  // DOM 元素
  const chatMessagesDiv = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel = document.getElementById('settingsPanel');
  const applyBtn = document.getElementById('applySettings');

  const headerImg = document.getElementById('headerIdolImg');
  const headerName = document.getElementById('headerIdolName');

  const myNameInput = document.getElementById('myNameInput');
  const myAvatarInput = document.getElementById('myAvatarInput');
  const idolNameInput = document.getElementById('idolNameInput');
  const idolAvatarInput = document.getElementById('idolAvatarInput');
  const myNickInput = document.getElementById('myNickInput');
  const idolNickInput = document.getElementById('idolNickInput');

  // ========== 辅助函数 ==========
  // 转义HTML并保留换行
  function formatMessageText(text) {
    if (!text) return '';
    return text
      .replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      })
      .replace(/\n/g, '<br>');
  }

  // 更新头部UI
  function updateHeader() {
    headerName.textContent = settings.idolName;
    if (settings.idolAvatar) {
      headerImg.src = settings.idolAvatar;
    } else {
      headerImg.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23cccccc"/%3E%3C/svg%3E';
    }
  }

  // 生成动态 system prompt（把称呼、名字替换进人设模板）
  function buildSystemPrompt() {
    let persona = settings.idolPersona;
    // 如果用户使用的是默认模板，就替换占位符；如果是自定义，则直接使用
    persona = persona.replace(/\{\{idolName\}\}/g, settings.idolName);
    persona = persona.replace(/\{\{myNick\}\}/g, settings.myNick);
    persona = persona.replace(/\{\{idolNick\}\}/g, settings.idolNick);
    // 额外确保禁止动作描写的强调（保险）
    if (!persona.includes('禁止任何动作描写')) {
      persona += '\n\n【再次强调】绝对不要输出任何动作、神态、场景描写，只输出纯对话。每句话后换行。';
    }
    return persona;
  }

  // 重置对话历史（应用新设置时调用）
  function resetConversation() {
    const systemContent = buildSystemPrompt();
    conversationHistory = [
      { role: 'system', content: systemContent }
    ];
  }

  // 添加消息到界面
  function addMessageToUI(text, sender, avatarUrl = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender === 'user' ? 'mine' : 'yours'}`;
    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    if (sender === 'user') {
      msgDiv.innerHTML = `<div class="bubble">${formatMessageText(text)}</div><div class="time">${timeStr}</div>`;
    } else {
      const idolImg = avatarUrl || settings.idolAvatar;
      const imgTag = idolImg ? `<img class="sender-img" src="${idolImg}" onerror="this.style.display='none'">` : '';
      msgDiv.innerHTML = `
        <div class="sender-info">${imgTag}<span class="sender-name">${settings.idolName}</span></div>
        <div class="bubble">${formatMessageText(text)}</div>
        <div class="time">${timeStr}</div>`;
    }
    chatMessagesDiv.appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  // 发送消息核心
  async function sendMessage() {
    const userText = userInput.value.trim();
    if (!userText) return;

    // 显示用户消息
    addMessageToUI(userText, 'user', settings.myAvatar);
    userInput.value = '';

    // 将用户消息加入历史
    conversationHistory.push({ role: 'user', content: userText });

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      let reply = data.reply || '…응답이 없어요. 다시 물어봐 줄래?';

      // 可选：清理可能残留的动作描写（简单过滤常见动作词）
      reply = reply.replace(/[我他她]笑了|[我他她]叹气|[我他她]点头|[我他她]摇头|我拿起|我放下|我看着|他看着/g, '');
      
      addMessageToUI(reply, 'idol', settings.idolAvatar);
      conversationHistory.push({ role: 'assistant', content: reply });

      // 限制历史长度（避免 token 过长）
      if (conversationHistory.length > 30) {
        // 保留 system 和最近 20 条
        const systemMsg = conversationHistory[0];
        const recent = conversationHistory.slice(-20);
        conversationHistory = [systemMsg, ...recent];
      }
    } catch (err) {
      console.error(err);
      addMessageToUI('⚠️ 오류가 발생했어요. 잠시 후 다시 시도해주세요.', 'idol', settings.idolAvatar);
    }
  }

  // 应用设置（从输入框读取并保存）
  function applySettings() {
    settings.myName = myNameInput.value.trim() || defaultSettings.myName;
    settings.myAvatar = myAvatarInput.value.trim() || defaultSettings.myAvatar;
    settings.idolName = idolNameInput.value.trim() || defaultSettings.idolName;
    settings.idolAvatar = idolAvatarInput.value.trim() || defaultSettings.idolAvatar;
    settings.myNick = myNickInput.value.trim() || defaultSettings.myNick;
    settings.idolNick = idolNickInput.value.trim() || defaultSettings.idolNick;

    // 保持原来的人设模板（如果用户没在面板里改过人设，就还用原来的模板）
    // 但为了方便，我们可以把人设也做成可编辑，但为了界面简单，这里保留 defaultSettings.idolPersona
    // 如果希望用户彻底改人设，可以添加一个 textarea，但根据需求，用户提供人设就改这里即可。
    // 注意：为了让称呼生效，需要重新构建 system prompt。
    resetConversation();

    updateHeader();
    settingsPanel.style.display = 'none';
    alert('설정이 적용되었습니다! 대화를 계속하세요.');
  }

  // 切换设置面板
  function toggleSettingsPanel() {
    if (settingsPanel.style.display === 'flex') {
      settingsPanel.style.display = 'none';
    } else {
      // 填入当前设置值
      myNameInput.value = settings.myName;
      myAvatarInput.value = settings.myAvatar;
      idolNameInput.value = settings.idolName;
      idolAvatarInput.value = settings.idolAvatar;
      myNickInput.value = settings.myNick;
      idolNickInput.value = settings.idolNick;
      settingsPanel.style.display = 'flex';
    }
  }

  // 初始化加载时，将人设模板中的占位符替换一次
  function init() {
    // 首先确保 idolPersona 包含占位符或直接使用已有内容
    if (settings.idolPersona === IDOL_PERSONA_TEMPLATE) {
      // 使用默认模板，替换掉占位符
      settings.idolPersona = IDOL_PERSONA_TEMPLATE;
    }
    resetConversation();
    updateHeader();

    // 可选：添加一条欢迎消息（避免空历史）
    if (conversationHistory.length === 1) {
      // 只有 system，可以加一条 assistant 欢迎语，但为了自然，不加也行。
    }
  }

  // 事件绑定
  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  settingsToggle.addEventListener('click', toggleSettingsPanel);
  applyBtn.addEventListener('click', applySettings);
  document.querySelector('.back-btn').addEventListener('click', () => {
    alert('聊天室 | 和爱豆的专属空间');
  });

  // 启动
  init();
</script>
</body>
</html>
