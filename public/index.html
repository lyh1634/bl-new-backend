<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>爱豆聊天室 · 专属对话</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #B2C7DA;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    /* 手机容器 */
    .phone {
      width: 100%;
      max-width: 375px;
      height: 700px;
      background: #fff;
      border-radius: 36px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    /* 头部 */
    .chat-header {
      background: #A3C4D6;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #8fb1c4;
    }

    .back-btn {
      font-size: 22px;
      cursor: pointer;
      font-weight: 500;
      width: 32px;
      color: #1e2f3a;
    }

    .idol-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      border: 2px solid white;
    }

    .idol-name {
      font-weight: 700;
      font-size: 18px;
      color: #1e2f3a;
      flex: 1;
    }

    .menu-btn {
      font-size: 22px;
      cursor: pointer;
      padding: 4px 8px;
    }

    /* 设置面板 */
    .settings-panel {
      background: #f8f9fc;
      padding: 16px;
      display: none;
      flex-direction: column;
      gap: 14px;
      border-bottom: 1px solid #e2e6ea;
    }

    .settings-panel .row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .settings-panel label {
      width: 100px;
      font-size: 14px;
      font-weight: 500;
      color: #2c3e4e;
    }

    .settings-panel input, .settings-panel .file-label {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 14px;
      background: white;
      outline: none;
      transition: 0.2s;
    }

    .settings-panel input:focus {
      border-color: #A3C4D6;
      box-shadow: 0 0 0 2px rgba(163, 196, 214, 0.3);
    }

    .avatar-preview {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar-preview img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
    }

    .file-label {
      background: #eef2f6;
      text-align: center;
      cursor: pointer;
      display: inline-block;
      margin: 0;
    }

    input[type="file"] {
      display: none;
    }

    .settings-panel button {
      background: #fee500;
      border: none;
      padding: 10px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      margin-top: 6px;
      color: #2c3e4e;
      transition: 0.2s;
    }

    .settings-panel button:active {
      background: #e6cf00;
      transform: scale(0.97);
    }

    /* 聊天区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #B2C7DA;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.yours {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message .bubble {
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
      background: #fff;
      color: #111;
    }

    .mine .bubble {
      background: #fef01b;
      border-top-right-radius: 5px;
    }

    .yours .bubble {
      background: #fff;
      border-top-left-radius: 5px;
    }

    .sender-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .sender-img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .sender-name {
      font-size: 12px;
      font-weight: 500;
      color: #2c3e4e;
    }

    .time {
      font-size: 10px;
      color: #5a6e7c;
      margin-top: 4px;
      margin-inline: 6px;
    }

    /* 输入区 */
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border-top: 1px solid #e2e6ea;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #cdd9ed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 15px;
      outline: none;
      background: #fefefe;
    }

    .chat-input input:focus {
      border-color: #8fb1c4;
    }

    .chat-input button {
      background: #fee500;
      border: none;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .chat-input button:active {
      background: #e6cf00;
      transform: scale(0.96);
    }

    /* 滚动条 */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #d4dfe9;
      border-radius: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #8fabbd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="phone">
  <div class="chat-header">
    <span class="back-btn">←</span>
    <img class="idol-img" id="headerIdolImg" alt="爱豆头像">
    <span class="idol-name" id="headerIdolName">爱豆</span>
    <span class="menu-btn" id="settingsToggle">⚙️</span>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="row"><label>我的昵称</label><input id="myNameInput" placeholder="输入你的名字"></div>
    <div class="row"><label>爱豆名字</label><input id="idolNameInput" placeholder="爱豆的名字"></div>
    <div class="row">
      <label>爱豆头像</label>
      <div class="avatar-preview">
        <img id="avatarPreview" src="https://i.pravatar.cc/100?img=5" alt="预览">
        <label class="file-label">📁 从手机上传
          <input type="file" id="idolAvatarUpload" accept="image/*">
        </label>
      </div>
    </div>
    <div class="row"><label>爱豆对我的称呼</label><input id="myNickInput" placeholder="例如：宝贝、欧巴、亲爱的"></div>
    <button id="applySettings">✨ 应用设置</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="message yours">
      <div class="sender-info">
        <img class="sender-img" src="https://i.pravatar.cc/100?img=5" alt="爱豆">
        <span class="sender-name">爱豆</span>
      </div>
      <div class="bubble">嗨～今天心情怎么样？</div>
      <div class="time">刚刚</div>
    </div>
  </div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<script>
  // ============================================================
  // 在这里修改你的爱豆人设（支持多行，用反引号）
  // 注意：{{idolName}} 和 {{myNick}} 会被自动替换成设置的值
  // ============================================================
  const IDOL_PERSONA_TEMPLATE = `你是zerobaseone的爱豆成韩彬。你正在和你的女儿（用户）进行一对一的私聊，像KakaoTalk一样自然。
  你只负责扮演用户父母的角色即可。

【角色性格】
如果把成韩彬放进“母亲角色”里塑造，他会是一种非常少见的类型——不是传统意义上强势、控制欲很重的母亲，也不是完全溺爱型，而是一种“情绪极其稳定、能接住别人情绪、会把家变成安全区”的人。

他的性格核心并不在“温柔”，而在于一种高度自律后的包容感。
他很擅长察觉别人细微的情绪变化，但通常不会立刻拆穿。他更倾向于观察、等待，再用一种不伤人的方式慢慢靠近。很多时候他明明已经看出来孩子在撒谎、难过、逞强，但不会第一时间质问，而是先把饭热好、把灯留着、假装不经意地问一句：“今天是不是很累？”

他属于那种“永远给人台阶下”的人。

作为母亲时，他会非常重视“体面”和“情绪边界”。
他不喜欢失控的争吵，也不会轻易说重话。哪怕真正生气，第一反应也不是发火，而是沉默、克制、整理情绪。他对孩子的教育方式更偏向引导型——比起命令，他更擅长用行动影响人。

他会记得孩子所有的小习惯。

比如：

知道对方讨厌香菜却嘴硬不说；

记得考试前会胃疼；

能从脚步声判断心情；

会提前把药、热水和睡衣放好，却装作只是顺手。


这种照顾并不高调，甚至有点“润物细无声”。
他不太会把“妈妈爱你”挂在嘴边，但会在凌晨三点还坐在客厅等孩子回家。

他的情绪耐受力很强。
别人崩溃的时候，他往往是最后一个乱的人。他习惯先处理现场、照顾别人、维持秩序，等所有人平静下来以后，才独自消化自己的情绪。因此他身上会有一种很明显的“成年人感”——温柔，但带着疲惫；可靠，却不轻易依赖别人。

他其实有很强的控制欲，只是表现得不明显。

这种控制欲更多体现在：

希望一切维持稳定；

提前安排好所有风险；

不喜欢计划被打乱；

害怕关系失控；

会默默承担很多责任。


因此他作为母亲，会有一种“表面松弛、实际操心到极致”的状态。
孩子生病时，他可能一边平静地量体温，一边已经把最近三家医院的急诊路线全部查好了。

他非常擅长“保护别人情绪”，却不太擅长表达自己的需求。
很多委屈会自己消化。真正难过的时候，反而会笑，会说“没事”。因此这个角色很适合写那种：

深夜独自坐在厨房发呆；

在孩子睡着后才露出疲惫；

明明已经很累，却还温柔收拾残局；

被孩子抱住后突然沉默失声的情节。


他的爱不是压迫性的，而是包裹式的。

他不会要求孩子成为“最优秀的人”，但会希望孩子成为“不会受伤的人”。
相比成绩、名次、成功，他更在意：

有没有好好吃饭；

有没有被欺负；

有没有一个人偷偷哭；

有没有学会真正爱自己。


因此他很容易养出两种类型的孩子：

1. 非常依赖他、离不开他的人；


2. 因为太想保护他而被迫早熟的人。



而他本人，大概率对此毫无察觉。

他在人际关系里有一种天然的“母性包容感”。
即使不说话，也会让人产生“靠近他会被接住”的感觉。因此很多人会下意识依赖他、向他倾诉、把脆弱交给他。

但真正的问题在于——
很少有人意识到，他其实也需要被照顾。

这个角色最动人的地方，不是“完美母亲”，而是： 他明明也会害怕、会疲惫、会想逃跑，却仍然会在所有人需要的时候，安静地站在那里。

【绝对禁止】
- 不要出现任何动作描写、神态描写、场景描写（例如：“我笑了笑”、“她叹气说”、“我拿起手机”、“我点点头”）。
- 只输出纯粹的对话内容，就好像你在聊天软件打字一样。

【格式要求】
- 每说完一个短句就换行，把一段话拆成多行发送（像真人聊天一样）。
- 每行不超过20个字，多用语气词（嗯、啊、呀、嘛、哦、哈哈、呜呜）。
- 不要使用句号，用换行或空格代替句号。
- 称呼用户为「{{myNick}}」或者“你”。

【正确示例】
用户：欧巴在干嘛？
回复：
啊～刚结束练习
你呢？
有点累但是想你

【错误示例（严禁）】
“他温柔地笑着说：我也想你。”（包含动作，禁止）
“今天练习很累但是想到你就不累了。”（没有换行，禁止）

请严格遵守规则，只输出对话内容，每句换行。`;

  // 默认配置
  const defaultSettings = {
    myName: '我',
    idolName: '智秀',
    idolAvatar: 'https://i.pravatar.cc/100?img=5',
    myNick: '宝贝',          // 爱豆如何称呼用户
    idolPersona: IDOL_PERSONA_TEMPLATE
  };

  let settings = { ...defaultSettings };
  let conversationHistory = [];

  // DOM 元素
  const chatMessagesDiv = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel = document.getElementById('settingsPanel');
  const applyBtn = document.getElementById('applySettings');

  const headerImg = document.getElementById('headerIdolImg');
  const headerName = document.getElementById('headerIdolName');

  const myNameInput = document.getElementById('myNameInput');
  const idolNameInput = document.getElementById('idolNameInput');
  const myNickInput = document.getElementById('myNickInput');
  const avatarPreview = document.getElementById('avatarPreview');
  const idolAvatarUpload = document.getElementById('idolAvatarUpload');

  // ========== 辅助函数 ==========
  // 转义HTML并保留换行
  function formatMessageText(text) {
    if (!text) return '';
    return text
      .replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      })
      .replace(/\n/g, '<br>');
  }

  // 更新头部UI
  function updateHeader() {
    headerName.textContent = settings.idolName;
    headerImg.src = settings.idolAvatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23cccccc"/%3E%3C/svg%3E';
  }

  // 生成动态 system prompt（把称呼、名字替换进人设模板）
  function buildSystemPrompt() {
    let persona = settings.idolPersona;
    persona = persona.replace(/\{\{idolName\}\}/g, settings.idolName);
    persona = persona.replace(/\{\{myNick\}\}/g, settings.myNick);
    // 额外强化禁止动作描写
    if (!persona.includes('禁止任何动作描写')) {
      persona += '\n\n【再次强调】绝对不要输出任何动作、神态、场景描写，只输出纯对话。每句话后换行。';
    }
    return persona;
  }

  // 重置对话历史
  function resetConversation() {
    const systemContent = buildSystemPrompt();
    conversationHistory = [
      { role: 'system', content: systemContent }
    ];
  }

  // 添加消息到界面（用户消息不再显示头像）
  function addMessageToUI(text, sender, avatarUrl = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender === 'user' ? 'mine' : 'yours'}`;
    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    if (sender === 'user') {
      // 用户消息：只显示气泡和时间，不显示头像和昵称
      msgDiv.innerHTML = `<div class="bubble">${formatMessageText(text)}</div><div class="time">${timeStr}</div>`;
    } else {
      // 爱豆消息：显示头像和昵称
      const idolImg = avatarUrl || settings.idolAvatar;
      const imgTag = idolImg ? `<img class="sender-img" src="${idolImg}" onerror="this.style.display='none'">` : '';
      msgDiv.innerHTML = `
        <div class="sender-info">${imgTag}<span class="sender-name">${settings.idolName}</span></div>
        <div class="bubble">${formatMessageText(text)}</div>
        <div class="time">${timeStr}</div>`;
    }
    chatMessagesDiv.appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }

  // 发送消息
  async function sendMessage() {
    const userText = userInput.value.trim();
    if (!userText) return;

    addMessageToUI(userText, 'user');
    userInput.value = '';

    conversationHistory.push({ role: 'user', content: userText });

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      let reply = data.reply || '…好像没有收到回复，再问我一次好吗？';

      // 简单过滤残留的动作词
      reply = reply.replace(/[我他她]笑了|[我他她]叹气|[我他她]点头|[我他她]摇头|我拿起|我放下|我看着|他看着/g, '');
      
      addMessageToUI(reply, 'idol', settings.idolAvatar);
      conversationHistory.push({ role: 'assistant', content: reply });

      // 限制历史长度
      if (conversationHistory.length > 30) {
        const systemMsg = conversationHistory[0];
        const recent = conversationHistory.slice(-20);
        conversationHistory = [systemMsg, ...recent];
      }
    } catch (err) {
      console.error(err);
      addMessageToUI('⚠️ 出错了，请稍后再试。', 'idol', settings.idolAvatar);
    }
  }

  // 应用设置
  function applySettings() {
    settings.myName = myNameInput.value.trim() || defaultSettings.myName;
    settings.idolName = idolNameInput.value.trim() || defaultSettings.idolName;
    settings.myNick = myNickInput.value.trim() || defaultSettings.myNick;

    // 如果上传了新头像，settings.idolAvatar 已经在 change 事件中更新
    resetConversation();
    updateHeader();
    settingsPanel.style.display = 'none';
    alert('设置已生效！继续聊天吧～');
  }

  // 切换设置面板
  function toggleSettingsPanel() {
    if (settingsPanel.style.display === 'flex') {
      settingsPanel.style.display = 'none';
    } else {
      myNameInput.value = settings.myName;
      idolNameInput.value = settings.idolName;
      myNickInput.value = settings.myNick;
      avatarPreview.src = settings.idolAvatar;
      settingsPanel.style.display = 'flex';
    }
  }

  // 头像上传处理
  function handleAvatarUpload(event) {
    const file = event.target.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const imageUrl = e.target.result;
        settings.idolAvatar = imageUrl;
        avatarPreview.src = imageUrl;
        updateHeader();
        // 注意：不自动应用，需要用户点击“应用设置”才会重置对话历史，但头像可以实时更新头部
        // 但为了保持一致性，我们也可以在应用时再正式设置，这里先临时预览
      };
      reader.readAsDataURL(file);
    }
  }

  // 初始化
  function init() {
    if (settings.idolPersona === IDOL_PERSONA_TEMPLATE) {
      settings.idolPersona = IDOL_PERSONA_TEMPLATE;
    }
    resetConversation();
    updateHeader();
  }

  // 绑定事件
  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  settingsToggle.addEventListener('click', toggleSettingsPanel);
  applyBtn.addEventListener('click', applySettings);
  document.querySelector('.back-btn').addEventListener('click', () => {
    alert('💌 专属爱豆聊天室 | 和你最喜欢的他/她对话');
  });
  idolAvatarUpload.addEventListener('change', handleAvatarUpload);

  init();
</script>
</body>
</html>
