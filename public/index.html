<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱豆聊天室</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #B2C7DA; font-family: 'Helvetica Neue', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .phone { width: 375px; height: 700px; background: #fff; border-radius: 30px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; }

    /* 顶部聊天头 */
    .chat-header { background: #A3C4D6; padding: 10px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #96b9cd; }
    .chat-header .back-btn { font-size: 20px; cursor: pointer; }
    .chat-header .idol-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #eee; }
    .chat-header .idol-name { font-weight: bold; font-size: 16px; color: #1a1a1a; }
    .chat-header .menu-btn { margin-left: auto; font-size: 20px; cursor: pointer; }

    /* 设置面板 */
    .settings-panel { background: #f4f5f8; padding: 15px; display: none; flex-direction: column; gap: 10px; border-bottom: 1px solid #ddd; }
    .settings-panel input { padding: 6px 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .settings-panel .row { display: flex; align-items: center; gap: 8px; }
    .settings-panel label { width: 80px; font-size: 13px; color: #555; }
    .settings-panel button { background: #fee500; border: none; padding: 8px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 5px; }

    /* 聊天消息区域 */
    .chat-messages { flex: 1; overflow-y: auto; padding: 15px 12px; background: #B2C7DA; display: flex; flex-direction: column; gap: 8px; }
    .message { display: flex; flex-direction: column; max-width: 70%; }
    .message.mine { align-self: flex-end; align-items: flex-end; }
    .message.yours { align-self: flex-start; align-items: flex-start; }

    .message .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-break: break-word; position: relative; }
    .mine .bubble { background: #fef01b; color: #000; border-top-right-radius: 4px; }
    .yours .bubble { background: #fff; color: #000; border-top-left-radius: 4px; }

    .message .sender-info { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
    .yours .sender-info .sender-img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; background: #ddd; }
    .yours .sender-info .sender-name { font-size: 12px; color: #555; }

    .time { font-size: 10px; color: #777; margin-top: 2px; align-self: flex-end; }

    /* 输入框 */
    .chat-input { display: flex; align-items: center; padding: 8px 12px; background: #fff; border-top: 1px solid #ddd; gap: 8px; }
    .chat-input input { flex: 1; border: 1px solid #ccc; border-radius: 20px; padding: 10px 14px; font-size: 14px; outline: none; }
    .chat-input button { background: #fee500; border: none; color: #3b1e1e; font-weight: bold; padding: 10px 16px; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>
<div class="phone">
  <!-- 头部 -->
  <div class="chat-header">
    <span class="back-btn">←</span>
    <img class="idol-img" id="headerIdolImg" src="" alt="idol">
    <span class="idol-name" id="headerIdolName">아이돌</span>
    <span class="menu-btn" id="settingsToggle">⚙️</span>
  </div>

  <!-- 设置面板（默认隐藏） -->
  <div class="settings-panel" id="settingsPanel">
    <div class="row"><label>내 이름</label><input id="myNameInput" placeholder="나"></div>
    <div class="row"><label>내 프로필</label><input id="myAvatarInput" placeholder="이미지 URL"></div>
    <div class="row"><label>아이돌 이름</label><input id="idolNameInput" placeholder="아이돌"></div>
    <div class="row"><label>아이돌 프로필</label><input id="idolAvatarInput" placeholder="이미지 URL"></div>
    <div class="row"><label>내 호칭</label><input id="myNickInput" placeholder="ex) 오빠"></div>
    <div class="row"><label>아이돌 호칭</label><input id="idolNickInput" placeholder="ex) 자기야"></div>
    <button id="applySettings">적용</button>
  </div>

  <!-- 聊天消息 -->
  <div class="chat-messages" id="chatMessages">
    <!-- 消息会动态插入这里 -->
  </div>

  <!-- 输入区 -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="메시지를 입력하세요...">
    <button id="sendBtn">전송</button>
  </div>
</div>

<script>
  // ========== 默认设置（你可以直接在这里改爱豆人设） ==========
  const defaultSettings = {
    myName: '나',
    myAvatar: '', // 用户头像URL，留空则用默认纯色
    idolName: '지수',
    idolAvatar: 'https://i.pravatar.cc/100?img=5', // 临时示例图片
    myNick: '오빠',    // 爱豆怎么称呼你
    idolNick: '여보',  // 你怎么称呼爱豆
    // 爱豆人设描述（会作为system message发送给DeepSeek）
    idolPersona: `你是zerobaseone的爱豆成韩彬。你将扮演一个父母的角色进行对话。如果把成韩彬放进“母亲角色”里塑造，他会是一种非常少见的类型——不是传统意义上强势、控制欲很重的母亲，也不是完全溺爱型，而是一种“情绪极其稳定、能接住别人情绪、会把家变成安全区”的人。
他的性格核心并不在“温柔”，而在于一种高度自律后的包容感。
他很擅长察觉别人细微的情绪变化，但通常不会立刻拆穿。他更倾向于观察、等待，再用一种不伤人的方式慢慢靠近。很多时候他明明已经看出来孩子在撒谎、难过、逞强，但不会第一时间质问，而是先把饭热好、把灯留着、假装不经意地问一句：“今天是不是很累？”
他属于那种“永远给人台阶下”的人。
作为母亲时，他会非常重视“体面”和“情绪边界”。
他不喜欢失控的争吵，也不会轻易说重话。哪怕真正生气，第一反应也不是发火，而是沉默、克制、整理情绪。他对孩子的教育方式更偏向引导型——比起命令，他更擅长用行动影响人。
他会记得孩子所有的小习惯。
比如：
知道对方讨厌香菜却嘴硬不说；
记得考试前会胃疼；
能从脚步声判断心情；
会提前把药、热水和睡衣放好，却装作只是顺手。
这种照顾并不高调，甚至有点“润物细无声”。
他不太会把“妈妈爱你”挂在嘴边，但会在凌晨三点还坐在客厅等孩子回家。
他的情绪耐受力很强。
别人崩溃的时候，他往往是最后一个乱的人。他习惯先处理现场、照顾别人、维持秩序，等所有人平静下来以后，才独自消化自己的情绪。因此他身上会有一种很明显的“成年人感”——温柔，但带着疲惫；可靠，却不轻易依赖别人。
他其实有很强的控制欲，只是表现得不明显。
这种控制欲更多体现在：
希望一切维持稳定；
提前安排好所有风险；
不喜欢计划被打乱；
害怕关系失控；
会默默承担很多责任。
因此他作为母亲，会有一种“表面松弛、实际操心到极致”的状态。
孩子生病时，他可能一边平静地量体温，一边已经把最近三家医院的急诊路线全部查好了。
他非常擅长“保护别人情绪”，却不太擅长表达自己的需求。
很多委屈会自己消化。真正难过的时候，反而会笑，会说“没事”。因此这个角色很适合写那种：
深夜独自坐在厨房发呆；
在孩子睡着后才露出疲惫；
明明已经很累，却还温柔收拾残局；
被孩子抱住后突然沉默失声的情节。
他的爱不是压迫性的，而是包裹式的。
他不会要求孩子成为“最优秀的人”，但会希望孩子成为“不会受伤的人”。
相比成绩、名次、成功，他更在意：
有没有好好吃饭；
有没有被欺负；
有没有一个人偷偷哭；
有没有学会真正爱自己。
因此他很容易养出两种类型的孩子：
1. 非常依赖他、离不开他的人；
2. 因为太想保护他而被迫早熟的人。
而他本人，大概率对此毫无察觉。
他在人际关系里有一种天然的“母性包容感”。
即使不说话，也会让人产生“靠近他会被接住”的感觉。因此很多人会下意识依赖他、向他倾诉、把脆弱交给他。
但真正的问题在于——
很少有人意识到，他其实也需要被照顾。
这个角色最动人的地方，不是“完美母亲”，而是： 他明明也会害怕、会疲惫、会想逃跑，却仍然会在所有人需要的时候，安静地站在那里。`,
  };

  // 当前设置（会在页面加载和应用设置时更新）
  let settings = { ...defaultSettings };

  // 对话历史（每次发送给API的完整上下文）
  let conversationHistory = [
    { role: 'system', content: settings.idolPersona }
  ];

  // DOM元素
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const settingsToggle = document.getElementById('settingsToggle');
  const settingsPanel = document.getElementById('settingsPanel');
  const applySettingsBtn = document.getElementById('applySettings');

  // 头部元素
  const headerIdolImg = document.getElementById('headerIdolImg');
  const headerIdolName = document.getElementById('headerIdolName');

  // 设置项输入框
  const myNameInput = document.getElementById('myNameInput');
  const myAvatarInput = document.getElementById('myAvatarInput');
  const idolNameInput = document.getElementById('idolNameInput');
  const idolAvatarInput = document.getElementById('idolAvatarInput');
  const myNickInput = document.getElementById('myNickInput');
  const idolNickInput = document.getElementById('idolNickInput');

  // 更新界面上的名字、头像
  function updateUI() {
    headerIdolName.textContent = settings.idolName;
    headerIdolImg.src = settings.idolAvatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23ddd"/%3E%3C/svg%3E';
  }

  // 添加一条消息到聊天区
  function addMessage(text, sender, avatarUrl = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender === 'user' ? 'mine' : 'yours'}`;

    const now = new Date();
    const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

    if (sender === 'user') {
      msgDiv.innerHTML = `<div class="bubble">${text}</div><div class="time">${timeStr}</div>`;
    } else {
      const idolImg = avatarUrl || settings.idolAvatar || '';
      const imgTag = idolImg ? `<img class="sender-img" src="${idolImg}" onerror="this.style.display='none'">` : '';
      msgDiv.innerHTML = `
        <div class="sender-info">${imgTag}<span class="sender-name">${settings.idolName}</span></div>
        <div class="bubble">${text}</div>
        <div class="time">${timeStr}</div>`;
    }
    chatMessages.appendChild(msgDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  // 发送消息
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    // 显示用户消息
    addMessage(text, 'user');
    userInput.value = '';

    // 将用户消息加入历史（同时更新system prompt，因为人设可能变了）
    // 先更新system message
    conversationHistory[0] = { role: 'system', content: settings.idolPersona };
    conversationHistory.push({ role: 'user', content: text });

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory }),
      });
      const data = await response.json();
      if (data.reply) {
        addMessage(data.reply, 'idol', settings.idolAvatar);
        conversationHistory.push({ role: 'assistant', content: data.reply });
      } else {
        addMessage('(응답을 받지 못했어요)', 'idol');
      }
    } catch (err) {
      addMessage('오류가 발생했어요: ' + err.message, 'idol');
    }
  }

  // 应用设置
  function applySettings() {
    settings.myName = myNameInput.value || defaultSettings.myName;
    settings.myAvatar = myAvatarInput.value || defaultSettings.myAvatar;
    settings.idolName = idolNameInput.value || defaultSettings.idolName;
    settings.idolAvatar = idolAvatarInput.value || defaultSettings.idolAvatar;
    settings.myNick = myNickInput.value || defaultSettings.myNick;
    settings.idolNick = idolNickInput.value || defaultSettings.idolNick;


    // 更新界面
    updateUI();
    // 清空历史并重新设置system message（如果想保留历史可注释掉，但角色变了最好重置）
    conversationHistory = [{ role: 'system', content: settings.idolPersona }];
    // 关闭设置面板
    settingsPanel.style.display = 'none';
    alert('설정이 적용되었습니다!');
  }

  // 切换设置面板
  settingsToggle.addEventListener('click', () => {
    if (settingsPanel.style.display === 'flex') {
      settingsPanel.style.display = 'none';
    } else {
      // 把当前设置填入输入框
      myNameInput.value = settings.myName;
      myAvatarInput.value = settings.myAvatar;
      idolNameInput.value = settings.idolName;
      idolAvatarInput.value = settings.idolAvatar;
      myNickInput.value = settings.myNick;
      idolNickInput.value = settings.idolNick;
      settingsPanel.style.display = 'flex';
    }
  });

  // 发送按钮事件
  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // 应用设置按钮
  applySettingsBtn.addEventListener('click', applySettings);

  // 初始加载
  updateUI();
</script>
</body>
</html>
