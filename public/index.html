<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>爱豆聊天室 · 专属对话</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #B2C7DA;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 0;
    }

    /* 手机容器 - 全屏 */
    .phone {
      width: 100%;
      height: 100vh;
      background: #fff;
      display: flex;
      flex-direction: column;
      box-shadow: none;
      border-radius: 0;
      overflow: hidden;
      position: relative;
    }

    /* 顶部：背景与聊天区域一致，高度降低 */
    .chat-header {
      background: #B2C7DA;      /* 与聊天背景一致 */
      padding: 8px 16px;        /* 降低高度 */
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: none;      /* 去掉边框，更融合 */
    }
    /* 爱豆头像（可点击） */
    .idol-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      background: #ddd;
      border: 2px solid white;
      cursor: pointer;
    }
    /* 爱豆名字（仅展示，不可点） */
    .idol-name {
      font-weight: 700;
      font-size: 18px;
      color: #1e2f3a;
      flex: 1;
    }

    /* 聊天区域 */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      background: #B2C7DA;
      display: flex;
      flex-direction: column;
      gap: 8px;                 /* 减小消息间距 */
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .message.mine {
      align-self: flex-end;
      align-items: flex-end;
    }

    .message.yours {
      align-self: flex-start;
      align-items: flex-start;
    }

    /* 气泡高度降低 */
    .message .bubble {
      padding: 6px 12px;        /* 原 10px 14px 改为更小 */
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
      background: #fff;
      color: #111;
      position: relative;
    }

    .mine .bubble {
      background: #fef01b;
      border-top-right-radius: 4px;
    }

    .yours .bubble {
      background: #fff;
      border-top-left-radius: 4px;
    }

    /* 时间显示在气泡右下角（绝对定位） */
    .message .time {
      font-size: 10px;
      color: #5a6e7c;
      margin-top: 2px;
      text-align: right;
    }
    /* 对于需要隐藏时间的情况，添加隐藏类 */
    .message .time.hide-time {
      display: none;
    }

    .sender-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
    }

    .sender-img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    .sender-name {
      font-size: 12px;
      font-weight: 500;
      color: #2c3e4e;
    }

    /* 输入区 */
    .chat-input {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border-top: 1px solid #e2e6ea;
      gap: 10px;
    }

    .chat-input input {
      flex: 1;
      border: 1px solid #cdd9ed;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 15px;
      outline: none;
      background: #fefefe;
    }

    .chat-input input:focus {
      border-color: #8fb1c4;
    }

    .chat-input button {
      background: #fee500;
      border: none;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 28px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s;
    }

    .chat-input button:active {
      background: #e6cf00;
      transform: scale(0.96);
    }

    /* 滚动条 */
    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: #d4dfe9;
      border-radius: 4px;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #8fabbd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
<div class="phone">
  <!-- 顶部：左侧头像（可点击），中间名字（仅展示） -->
  <div class="chat-header">
    <img class="idol-avatar" id="headerIdolImg" alt="爱豆头像" src="https://i.pravatar.cc/100?img=5">
    <span class="idol-name" id="headerIdolName">爱豆</span>
  </div>

  <!-- 聊天消息区域 -->
  <div class="chat-messages" id="chatMessages">
    <!-- 消息会动态插入 -->
  </div>

  <!-- 输入区 -->
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="输入消息...">
    <button id="sendBtn">发送</button>
  </div>
</div>

<!-- 模态框：用于展示独立设置页面（idol_profile.html） -->
<div id="profileModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
  <div style="display: flex; justify-content: center; align-items: center; height: 100%;">
    <iframe id="profileIframe" src="" style="width: 90%; height: 80%; border-radius: 30px; background: white; border: none;"></iframe>
  </div>
</div>

<script>
  // ============================================================
  // 爱豆人设模板（{{idolName}} 和 {{myNick}} 会被动态替换）
  // ============================================================
  const IDOL_PERSONA_TEMPLATE = `你是zerobaseone的爱豆成韩彬。你正在和你的女儿（用户）进行一对一的私聊，像KakaoTalk一样自然。
  你只负责扮演用户父母的角色即可。

【角色性格】
你可以把他理解成一种“外热内稳”的人。
...（此处省略重复内容，请保留你原来的完整人设）...

【绝对禁止】
- 不要出现任何动作描写、神态描写、场景描写。
- 只输出纯粹的对话内容。

【格式要求】
- 每说完一个短句就换行。
- 每行不超过20个字，多用语气词。
- 称呼用户为「{{myNick}}」或者“你”。

请严格遵守规则，只输出对话内容，每句换行。`;

  // 默认配置
  const defaultSettings = {
    myName: '我',
    idolName: '冰冰',
    idolAvatar: 'https://i.pravatar.cc/100?img=5',
    myNick: '宝贝',
    idolPersona: IDOL_PERSONA_TEMPLATE
  };

  let settings = { ...defaultSettings };
  let conversationHistory = [];

  // 用于时间显示逻辑：记录上一条消息的发送者和时间（到分钟）
  let lastMessage = { sender: null, timeStr: null };

  // DOM 元素
  const chatMessagesDiv = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const headerImg = document.getElementById('headerIdolImg');
  const headerName = document.getElementById('headerIdolName');

  // ========== 辅助函数 ==========
  function formatMessageText(text) {
    if (!text) return '';
    return text
      .replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    // 保留换行符，由 CSS white-space: pre-wrap 处理
  }

  function updateHeader() {
    headerName.textContent = settings.idolName;
    headerImg.src = settings.idolAvatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23cccccc"/%3E%3C/svg%3E';
  }

  function buildSystemPrompt() {
    let persona = settings.idolPersona;
    persona = persona.replace(/\{\{idolName\}\}/g, settings.idolName);
    persona = persona.replace(/\{\{myNick\}\}/g, settings.myNick);
    if (!persona.includes('禁止任何动作描写')) {
      persona += '\n\n【再次强调】绝对不要输出任何动作、神态、场景描写，只输出纯对话。每句话后换行。';
    }
    return persona;
  }

  function resetConversation() {
    const systemContent = buildSystemPrompt();
    conversationHistory = [
      { role: 'system', content: systemContent }
    ];
  }

  // 获取当前时间字符串 HH:MM
  function getCurrentTimeStr() {
    const now = new Date();
    return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  }

  // 添加消息到界面，支持时间智能显示
  function addMessageToUI(text, sender, avatarUrl = '') {
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender === 'user' ? 'mine' : 'yours'}`;
    
    const currentTimeStr = getCurrentTimeStr();
    // 判断是否显示时间：如果上一条消息发送者相同且时间相同，则隐藏当前消息的时间
    const shouldShowTime = !(lastMessage.sender === sender && lastMessage.timeStr === currentTimeStr);
    
    if (sender === 'user') {
      // 用户消息：只显示气泡
      msgDiv.innerHTML = `<div class="bubble">${formatMessageText(text)}</div>
                          <div class="time ${shouldShowTime ? '' : 'hide-time'}">${currentTimeStr}</div>`;
    } else {
      const idolImg = avatarUrl || settings.idolAvatar;
      const imgTag = idolImg ? `<img class="sender-img" src="${idolImg}" onerror="this.style.display='none'">` : '';
      msgDiv.innerHTML = `
        <div class="sender-info">${imgTag}<span class="sender-name">${settings.idolName}</span></div>
        <div class="bubble">${formatMessageText(text)}</div>
        <div class="time ${shouldShowTime ? '' : 'hide-time'}">${currentTimeStr}</div>`;
    }
    
    chatMessagesDiv.appendChild(msgDiv);
    msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
    
    // 更新 lastMessage 记录
    lastMessage = { sender: sender, timeStr: currentTimeStr };
  }

  // 发送消息
  async function sendMessage() {
    const userText = userInput.value.trim();
    if (!userText) return;

    addMessageToUI(userText, 'user');
    userInput.value = '';
    conversationHistory.push({ role: 'user', content: userText });

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      let reply = data.reply || '...好像没有收到回复，再问我一次好吗？';

      // 简单过滤残留的动作词
      reply = reply.replace(/我笑了|他笑了|她笑了|我叹气|他叹气|她叹气|我点头|他点头|她点头|我摇头|他摇头|她摇头|我拿起|我放下|我看着|他看着/g, '');

      // 按换行拆分成多个独立气泡
      const lines = reply.split(/\r?\n/).filter(line => line.trim().length > 0);
      if (lines.length === 0) {
        addMessageToUI(reply, 'idol', settings.idolAvatar);
      } else {
        for (const line of lines) {
          addMessageToUI(line, 'idol', settings.idolAvatar);
        }
      }
      // 将完整回复存入历史
      conversationHistory.push({ role: 'assistant', content: reply });

      if (conversationHistory.length > 30) {
        const systemMsg = conversationHistory[0];
        const recent = conversationHistory.slice(-20);
        conversationHistory = [systemMsg, ...recent];
      }
    } catch (err) {
      console.error(err);
      addMessageToUI('⚠️ 出错了，请稍后再试。', 'idol', settings.idolAvatar);
    }
  }

  // ========== 模态框相关（点击头像打开设置页面） ==========
  function openProfileModal() {
    const modal = document.getElementById('profileModal');
    const iframe = document.getElementById('profileIframe');
    iframe.src = '/idol_profile.html';
    modal.style.display = 'flex';
    iframe.onload = function() {
      iframe.contentWindow.postMessage({
        type: 'loadSettings',
        settings: {
          idolName: settings.idolName,
          idolAvatar: settings.idolAvatar,
          myNick: settings.myNick,
          myName: settings.myName
        }
      }, '*');
    };
  }

  window.closeProfileModal = function() {
    const modal = document.getElementById('profileModal');
    const iframe = document.getElementById('profileIframe');
    modal.style.display = 'none';
    iframe.src = '';
  };

  // 接收来自 iframe 的设置更新
  window.addEventListener('message', function(event) {
    if (event.data.type === 'saveSettings') {
      const newSettings = event.data.settings;
      settings.idolName = newSettings.idolName;
      settings.idolAvatar = newSettings.idolAvatar;
      settings.myNick = newSettings.myNick;
      if (newSettings.myName) settings.myName = newSettings.myName;

      updateHeader();
      resetConversation();
      alert('设置已更新！');
      window.closeProfileModal();
    } else if (event.data.type === 'closeProfile') {
      window.closeProfileModal();
    }
  });

  // 初始化
  function init() {
    if (settings.idolPersona === IDOL_PERSONA_TEMPLATE) {
      settings.idolPersona = IDOL_PERSONA_TEMPLATE;
    }
    resetConversation();
    updateHeader();
    // 清空 lastMessage 记录
    lastMessage = { sender: null, timeStr: null };
  }

  // 绑定事件
  sendBtn.addEventListener('click', sendMessage);
  userInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });
  headerImg.addEventListener('click', openProfileModal);  // 点击头像打开 profile

  init();
</script>
</body>
</html>
